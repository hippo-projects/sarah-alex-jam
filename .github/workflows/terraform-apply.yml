name: Terraform Apply (manual)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: staging
        type: choice
        options:
          - staging
      action:
        description: Terraform action
        required: true
        default: apply
        type: choice
        options:
          - plan
          - apply
          - destroy

env:
  AWS_REGION: us-east-1

jobs:
  terraform:
    name: Terraform ${{ inputs.action }} (${{ inputs.environment }})
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        working-directory: terraform/${{ inputs.environment }}
        run: terraform init

      - name: Terraform ${{ inputs.action }}
        working-directory: terraform/${{ inputs.environment }}
        env:
          TF_VAR_docdb_password: ${{ secrets.STAGING_DOCDB_PASSWORD }}
          TF_VAR_jwt_secret: ${{ secrets.STAGING_JWT_SECRET }}
          TF_VAR_google_client_id: ${{ secrets.STAGING_GOOGLE_CLIENT_ID }}
        run: terraform ${{ inputs.action }} -auto-approve

      - name: Show outputs
        if: inputs.action != 'destroy'
        working-directory: terraform/${{ inputs.environment }}
        run: |
          echo "## Terraform ${{ inputs.action }} (${{ inputs.environment }})" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          terraform output >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
