name: Deploy Client (manual)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: staging
        type: choice
        options:
          - staging

env:
  AWS_REGION: us-east-1

jobs:
  deploy-client:
    name: Build and deploy client
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build client
        env:
          VITE_GRAPHQL_URL: ${{ secrets.STAGING_APPRUNNER_URL }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.STAGING_GOOGLE_CLIENT_ID }}
        run: yarn workspace sarah-alex-jam-client build

      - name: Deploy to S3
        run: aws s3 sync client/dist/ s3://${{ secrets.STAGING_S3_BUCKET }}/ --delete

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.STAGING_CLOUDFRONT_ID }} \
            --paths "/*"

      - name: Summary
        run: |
          echo "## Client deployed" >> $GITHUB_STEP_SUMMARY
          echo "- **URL:** https://${{ secrets.STAGING_CLOUDFRONT_DOMAIN }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
